<!DOCTYPE html>
<html lang="en" ng-app="HealthApp"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doctor Login - DHW</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>
</head>
<body ng-controller="MainController"> <h1>Doctor Login</h1>
    <div id="registrationForm"> 
        <form ng-submit="login()">
            <table align="center" cellpadding="10">
                <tr>
                    <td>Username:</td>
                    <td><input type="text" ng-model="username" required></td> </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" ng-model="password" required></td> </tr>
                <tr>
                    <td colspan="2" align="center">
                        <button type="submit">Login</button>
                    </td>
                </tr>
            </table>
        </form>
        <p style="color: #ff4d4d; font-size: 1rem; text-align: center;">{{errorMessage}}</p>
    </div>
</body>
</html>
